<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tycoon Minerador PRO</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0b1d33;color:white}
.app{max-width:420px;margin:auto;padding:15px}
.card{background:#1e2f4a;padding:12px;border-radius:12px;margin-bottom:10px}
button{width:100%;padding:12px;margin:6px 0;border:none;border-radius:10px;background:#ffcc00}
.bar{height:10px;background:#333;border-radius:10px}
.fill{height:100%;width:0%;background:lime}
</style>
</head>

<body>

<div id="login" class="app">
<div class="card">
<h2>🎮 Tycoon Minerador</h2>
<input id="email" placeholder="Email"><br><br>
<input id="password" type="password" placeholder="Senha"><br><br>
<button onclick="register()">Criar Conta</button>
<button onclick="loginUser()">Entrar</button>
</div>
</div>

<div id="game" style="display:none" class="app">

<div class="card">
👤 <span id="player"></span>
<button onclick="logout()">🚪 Sair</button>
</div>

<div class="card">
💰 <span id="money">0</span><br>
📦 <span id="storage">0</span><br>
🚚 <span id="ready">0</span>
<div class="bar"><div id="progress" class="fill"></div></div>
</div>

<div class="card">
<button onclick="mineClick()">⛏️ Minerar</button>
<button onclick="toReady()">📦 Enviar</button>
<button onclick="sell()">💰 Vender</button>
</div>

<div class="card">
<button onclick="buyMiner()">🤖 Minerador ($50)</button>
<button onclick="buySeller()">🚚 Vendedor ($150)</button>
</div>

<div class="card">
<button onclick="saveManual()">💾 Salvar</button>
</div>

<div class="card">
<h3>📊 Perfil</h3>
Partidas: <span id="games">0</span>
</div>

<div class="card">
<button onclick="saveScore()">🏆 Salvar Pontuação</button>
<button onclick="openRanking()">📊 Meu Ranking</button>
<div id="rankingList"></div>
</div>

</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyA5WrSyfcOhObMOwwJPlNl_Ok0t4shq5eg",
  authDomain: "tycoon-minerador-profissional1.firebaseapp.com",
  projectId: "tycoon-minerador-profissional1"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN */
function register(){
  auth.createUserWithEmailAndPassword(email(),pass())
  .catch(e=>alert(e.message));
}

function loginUser(){
  auth.signInWithEmailAndPassword(email(),pass())
  .catch(e=>alert(e.message));
}

function logout(){
  auth.signOut();
  location.reload();
}

function email(){return document.getElementById("email").value;}
function pass(){return document.getElementById("password").value;}

auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("login").style.display="none";
    document.getElementById("game").style.display="block";
    document.getElementById("player").innerText = user.email;
    loadOnline();
    loadStats();
  }
});

/* GAME */
let money=0,storage=0,ready=0;
let miner=0,seller=0;

function mineClick(){storage++;update();}
function toReady(){ready+=storage;storage=0;update();}
function sell(){money+=ready;ready=0;update();}

function buyMiner(){if(money>=50){money-=50;miner++;update();}}
function buySeller(){if(money>=150){money-=150;seller++;update();}}

setInterval(()=>{
  storage+=miner;
  let vendido=Math.min(ready,seller);
  ready-=vendido;
  money+=vendido;
  update();
},1000);

/* UPDATE */
function update(){
  document.getElementById("money").innerText=money;
  document.getElementById("storage").innerText=storage;
  document.getElementById("ready").innerText=ready;
  document.getElementById("progress").style.width=Math.min(storage,100)+"%";
}

/* SAVE */
async function saveManual(){
  await saveOnline();
  alert("💾 Salvo!");
}

async function saveOnline(){
  let u=auth.currentUser;
  if(!u)return;
  await db.collection("players").doc(u.uid).set({
    money,storage,ready,miner,seller
  });
}

setInterval(saveOnline,5000);

/* LOAD */
async function loadOnline(){
  let u=auth.currentUser;
  if(!u)return;

  let doc=await db.collection("players").doc(u.uid).get();

  if(doc.exists){
    let d=doc.data();
    money=d.money||0;
    storage=d.storage||0;
    ready=d.ready||0;
    miner=d.miner||0;
    seller=d.seller||0;
  }

  update();
}

/* STATS */
async function loadStats(){
  let u=auth.currentUser;
  if(!u)return;

  let snap = await db.collection("ranking")
  .where("uid","==",u.uid)
  .get();

  document.getElementById("games").innerText = snap.size;
}

/* RANKING CORRIGIDO */
async function saveScore(){
  let u=auth.currentUser;
  if(!u)return;

  await db.collection("ranking").add({
    uid:u.uid,
    score:money
  });

  alert("🏆 Pontuação salva!");
}

async function openRanking(){

  let u=auth.currentUser;
  if(!u)return;

  let list=document.getElementById("rankingList");
  list.innerHTML="Carregando...";

  let snap = await db.collection("ranking")
  .where("uid","==",u.uid)
  .get();

  let data=[];

  snap.forEach(doc=>{
    data.push(doc.data());
  });

  data.sort((a,b)=>b.score-a.score);
  data=data.slice(0,10);

  list.innerHTML="";

  data.forEach((d,i)=>{
    list.innerHTML += 
    "<div class='card'>" + (i+1) + "º 💰 " + d.score + "</div>";
  });
}

</script>

</body>
</html>
